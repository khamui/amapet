<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [closable]="true"
  [dismissableMask]="true"
  [draggable]="false"
  [resizable]="false"
  header="Sign In"
  [style]="{ width: '450px' }"
  (onHide)="closeDialog()"
>
  <div class="dialog-content">
    <p class="dialog-text">
      In case it is your first time logging in, we will create a profile for
      you!
    </p>

    <div class="social-buttons">
      @if (ses.appIsAvailable()) {
        <div class="social-button-wrapper">
          <asl-google-signin-button
            type="standard"
            size="large"
            [width]="350"
          ></asl-google-signin-button>
        </div>

        <!-- Microsoft Sign-In Button -->
        <div class="social-button-wrapper">
          <button
            type="button"
            class="flex w-full max-w-[350px] items-center justify-center gap-3 rounded border border-gray-300 dark:border-surface-600 bg-white dark:bg-surface-800 px-4 py-3 font-medium text-gray-700 dark:text-surface-300 transition-colors hover:bg-gray-50 dark:hover:bg-surface-700"
            (click)="signInWithMicrosoft()"
          >
            <svg class="h-5 w-5" viewBox="0 0 21 21">
              <rect x="1" y="1" width="9" height="9" fill="#f25022" />
              <rect x="11" y="1" width="9" height="9" fill="#7fba00" />
              <rect x="1" y="11" width="9" height="9" fill="#00a4ef" />
              <rect x="11" y="11" width="9" height="9" fill="#ffb900" />
            </svg>
            Sign in with Microsoft
          </button>
        </div>
      }
    </div>
  </div>
</p-dialog>
