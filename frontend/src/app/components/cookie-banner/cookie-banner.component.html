@if (showBanner()) {
  <div
    class="fixed bottom-10 left-0 right-0 z-50 mx-4 md:mx-auto md:max-w-2xl rounded-lg bg-white dark:bg-surface-800 border border-surface-100 dark:border-surface-700 p-4 shadow-lg"
  >
    <div class="flex flex-col gap-4">
      <div class="text-sm text-surface-700 dark:text-surface-300">
        <p class="font-medium mb-2">Cookie & Storage Notice</p>
        <p>
          We use localStorage to store your authentication token and theme preferences.
          By accepting, you consent to this data storage.
          <a routerLink="/privacy" class="text-primary hover:underline">Learn more</a>
        </p>
      </div>
      <div class="flex flex-wrap gap-2 justify-end">
        <p-button
          label="Reject"
          [outlined]="true"
          severity="secondary"
          size="small"
          (click)="reject()"
        />
        <p-button
          label="Accept"
          size="small"
          (click)="accept()"
        />
      </div>
    </div>
  </div>
}
