@if (isBrowser) {
  <div class="my-3">
    <p-fileUpload
      #fileUploadRef
      [customUpload]="true"
      [multiple]="true"
      accept="image/jpeg,image/png,image/gif,image/webp"
      [maxFileSize]="5242880"
      [showUploadButton]="false"
      [showCancelButton]="false"
      [disabled]="!canAddMore()"
      chooseLabel="Add Images"
      chooseIcon="pi pi-images"
      (onSelect)="onFilesSelected($event)"
      data-testid="image-upload-input"
    >
      <ng-template #header let-chooseCallback="chooseCallback">
        <div class="flex items-center gap-2 p-2">
          <p-button
            (onClick)="chooseCallback()"
            [disabled]="!canAddMore()"
            icon="pi pi-images"
            label="Add Images"
            severity="secondary"
            [outlined]="true"
          />
        </div>
      </ng-template>

      <ng-template #content>
        @if (allImages().length > 0) {
          <div class="flex flex-wrap gap-3 py-3 px-2">
            @for (img of allImages(); track img.id) {
              <div class="relative group">
                <img
                  [src]="img.preview"
                  alt="Image preview"
                  class="w-24 h-24 object-cover rounded border border-surface-200 dark:border-surface-600"
                />
                <button
                  type="button"
                  (click)="removeImage(img.id)"
                  class="absolute -top-2 -right-2 w-6 h-6 rounded-full bg-red-500 text-white flex items-center justify-center text-xs cursor-pointer hover:bg-red-600"
                  data-testid="remove-image"
                >
                  <i class="pi pi-times text-xs"></i>
                </button>
              </div>
            }
          </div>
        } @else {
          <div class="flex items-center justify-center py-6">
            <p class="text-surface-500 dark:text-surface-400 text-sm">
              Drag and drop images here ({{ totalCount() }}/5)
            </p>
          </div>
        }
      </ng-template>
    </p-fileUpload>
  </div>
}
