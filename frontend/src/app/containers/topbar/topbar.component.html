<p-toolbar>
  <div class="p-toolbar-group-start flex items-center gap-2 min-w-0">
    <p-button
      #burgerMenu
      styleClass="p-3"
      class="lg:hidden"
      [text]="true"
      [raised]="true"
      (onClick)="handleToggleMobileDrawer()"
    >
      <i [class]="burgerIcon()"></i>
    </p-button>
    <button
      (click)="handleNavigateHome()"
      class="cursor-pointer flex items-center gap-2 min-w-0"
    >
      <img
        class="h-10 shrink-0"
        src="../../../assets/helpaws_logo_petrol.png"
      />
      <span
        class="font-semibold text-lg bg-gradient-to-r from-teal-400 to-amber-400 dark:from-teal-200 dark:to-zinc-50 bg-clip-text text-transparent hidden lg:inline"
        >Helpaws</span
      >
      <span
        class="text-xs font-bold bg-surface-200 dark:bg-surface-700 text-surface-600 dark:text-surface-300 px-2 py-0.5 rounded-full hidden lg:inline"
      >
        BETA
      </span>
    </button>
  </div>
  <div class="p-toolbar-group-end gap-2 flex items-center">
    @if (isLoggedIn()) {
      @if (hasPermLevel()) {
        <p-button
          #globalSettingsButton
          styleClass="p-3"
          class="hidden lg:inline-flex"
          [rounded]="true"
          [text]="true"
          [raised]="true"
          (click)="router.navigate(['global-settings'])"
        >
          <i class="pi pi-cog"></i>
        </p-button>
      }
      <ama-notifications></ama-notifications>
      <p-button
        styleClass="p-3"
        class="hidden lg:inline-flex"
        [rounded]="true"
        [text]="true"
        [raised]="true"
        (click)="toggleUserMenu($event)"
      >
        <i class="pi pi-user"></i>
      </p-button>
      <p-button
        label="Logout"
        icon="pi pi-sign-out"
        class="danger-50 hidden lg:inline-flex"
        styleClass="p-button-danger"
        size="small"
        (onClick)="handleLogout()"
      ></p-button>
      <p-button
        styleClass="p-3"
        class="lg:hidden"
        [rounded]="true"
        [text]="true"
        [raised]="true"
        (click)="toggleOverflowMenu($event)"
      >
        <i class="pi pi-ellipsis-v"></i>
      </p-button>
    } @else {
      <p-button
        label="Login/Register"
        icon="pi pi-sign-in"
        class="mr-2 primary-50"
        styleClass="p-button-warning"
        size="small"
        (onClick)="handleOpenLoginDialog()"
      ></p-button>
    }
  </div>
</p-toolbar>

@if (isLoggedIn()) {
  <p-menu #menu [model]="userMenuItems()" [popup]="true">
    <ng-template #start>
      <div class="p-2 flex justify-center border-b border-surface-200">
        <ama-theme-switcher></ama-theme-switcher>
      </div>
    </ng-template>
  </p-menu>
  <p-menu #overflowMenu [model]="overflowMenuItems()" [popup]="true">
    <ng-template #start>
      <div class="p-2 flex justify-center border-b border-surface-200">
        <ama-theme-switcher></ama-theme-switcher>
      </div>
    </ng-template>
  </p-menu>
}

<ama-social-login-dialog
  [(visible)]="showLoginDialog"
></ama-social-login-dialog>
