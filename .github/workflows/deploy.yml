name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout
        uses: actions/checkout@v3

      # Detect changes
      - name: Detect changes
        id: changes
        run: |
          git fetch origin main --depth=2

          FRONTEND_CHANGED="false"
          BACKEND_CHANGED="false"
          DEPLOYMENT_CHANGED="false"
          WORKFLOWS_CHANGED="false"

          if git diff --name-only HEAD~1 HEAD | grep -q '^frontend/'; then
            echo "Frontend changed!"
            FRONTEND_CHANGED="true"
          fi

          if git diff --name-only HEAD~1 HEAD | grep -q '^backend/'; then
            echo "Backend changed!"
            BACKEND_CHANGED="true"
          fi

          if git diff --name-only HEAD~1 HEAD | grep -q '^deployment/'; then
            echo "Deployment config changed!"
            DEPLOYMENT_CHANGED="true"
          fi

          if git diff --name-only HEAD~1 HEAD | grep -q '^\.github/workflows/'; then
            echo "Workflows changed!"
            WORKFLOWS_CHANGED="true"
          fi

          echo "frontend=$FRONTEND_CHANGED" >> $GITHUB_OUTPUT
          echo "backend=$BACKEND_CHANGED" >> $GITHUB_OUTPUT
          echo "deployment=$DEPLOYMENT_CHANGED" >> $GITHUB_OUTPUT
          echo "workflows=$WORKFLOWS_CHANGED" >> $GITHUB_OUTPUT

          echo "Frontend changed: $FRONTEND_CHANGED"
          echo "Backend changed: $BACKEND_CHANGED"
          echo "Deployment changed: $DEPLOYMENT_CHANGED"
          echo "Workflows changed: $WORKFLOWS_CHANGED"

      # Setup SSH
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_DEPLOY_KEY }}

      # Create .env inside deployment/
      - name: Create .env
        run: |
          mkdir -p deployment
          cat > deployment/.env <<EOF
          JWT_SECRET="${{ secrets.JWT_SECRET }}"
          GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}"
          MICROSOFT_CLIENT_ID="${{ secrets.MICROSOFT_CLIENT_ID }}"
          MONGO_USER="${{ secrets.MONGO_USER }}"
          MONGO_PASSWORD="${{ secrets.MONGO_PASSWORD }}"
          MONGO_DB="${{ secrets.MONGO_DB }}"
          ME_USER="${{ secrets.ME_USER }}"
          ME_PASSWORD="${{ secrets.ME_PASSWORD }}"
          BACKEND_PORT="${{ secrets.BACKEND_PORT }}"
          FRONTEND_PORT="${{ secrets.FRONTEND_PORT }}"
          PLATFORM_ADMIN_EMAIL="${{ secrets.PLATFORM_ADMIN_EMAIL }}"
          LEGAL_NAME="${{ secrets.LEGAL_NAME }}"
          LEGAL_STREET="${{ secrets.LEGAL_STREET }}"
          LEGAL_CITY="${{ secrets.LEGAL_CITY }}"
          LEGAL_COUNTRY="${{ secrets.LEGAL_COUNTRY }}"
          LEGAL_EMAIL="${{ secrets.LEGAL_EMAIL }}"
          LEGAL_WEBSITE="${{ secrets.LEGAL_WEBSITE }}"
          SITE_URL="${{ secrets.SITE_URL }}"
          API_URL="${{ secrets.API_URL }}"
          FRONTEND_URL="${{ secrets.FRONTEND_URL }}"
          IMGBB_API_KEY="${{ secrets.IMGBB_API_KEY }}"
          EOF

      # Upload files to VPS (deployment/, frontend/, backend/)
      - name: Upload to VPS
        run: |
          ssh -o StrictHostKeyChecking=no -p 2233 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "rm -rf /home/${{ secrets.VPS_USER }}/containers/amapet-temp && mkdir -p /home/${{ secrets.VPS_USER }}/containers/amapet-temp"

          scp -o StrictHostKeyChecking=no -P 2233 -r \
            deployment frontend backend \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/${{ secrets.VPS_USER }}/containers/amapet-temp

      # Deploy on VPS
      - name: Deploy on VPS
        run: |
          ssh -o StrictHostKeyChecking=no -p 2233 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << EOF

          set -e

          cd /home/${{ secrets.VPS_USER }}/containers

          # Stop containers first to release bind mounts
          if [ -d "amapet/deployment" ]; then
            cd amapet/deployment
            docker compose down
            cd ../..
          fi

          # Use docker to remove root-owned files from bind mounts (avoids sudo password prompt)
          docker run --rm -v /home/${{ secrets.VPS_USER }}/containers:/containers alpine rm -rf /containers/amapet
          mv amapet-temp amapet
          cd amapet/deployment

          chmod 600 .env

          # Workflows changed warning
          if [ "${{ steps.changes.outputs.workflows }}" = "true" ]; then
            echo "::warning::Workflow files changed - changes will apply on next run"
          fi

          # If frontend changed, stop and rebuild
          if [ "${{ steps.changes.outputs.frontend }}" = "true" ]; then
            echo "Rebuilding frontend"
            docker compose stop frontend
            docker compose build frontend
          fi

          # If backend changed, stop and rebuild
          if [ "${{ steps.changes.outputs.backend }}" = "true" ]; then
            echo "Rebuilding backend"
            docker compose stop backend
            docker compose build backend
          fi

          docker compose up -d

          echo "Deployment complete."
          EOF

