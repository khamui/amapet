name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      NODE_ENV: test
      MONGO_URI: mongodb://localhost:27017/amapet_test
      JWT_SECRET: test-jwt-secret-for-e2e
      GOOGLE_CLIENT_ID: test-google-client-id
      MICROSOFT_CLIENT_ID: test-microsoft-client-id
      PORT: 3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json
            e2e/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install E2E dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: e2e

      - name: Build backend
        run: npm run build
        working-directory: backend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Start backend
        run: npm run start &
        working-directory: backend

      - name: Start frontend SSR
        run: npm run serve:ssr:frontend &
        working-directory: frontend

      - name: Wait for services
        run: |
          npx wait-on http://localhost:3000 --timeout 60000
          npx wait-on http://localhost:4200 --timeout 120000

      - name: Run Playwright tests
        run: npx playwright test --shard=${{ matrix.shard }}/3
        working-directory: e2e
        env:
          CI: true
          BASE_URL: http://localhost:4200
          API_URL: http://localhost:3000

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: e2e/playwright-report/
          retention-days: 7

      - name: Upload test traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-traces-shard-${{ matrix.shard }}
          path: e2e/test-results/
          retention-days: 7
