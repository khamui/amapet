services:
  mongo:
    image: mongo:6
    container_name: amapet-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    networks:
      - amapet-network

  mongo-express:
    image: mongo-express:latest
    container_name: amapet-mongo-express
    depends_on:
      - mongo
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: mongo        # <-- service name of Mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_USER}   # web login username
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_PASSWORD}   # web login password
    networks:
      - amapet-network      # can talk to mongo
      - npm          # optional: make accessible through nginx-proxy-manager
    # Expose port only if you want direct access
    ports:
      - "8085:8081"

  backend:
    build:
      context: ../backend
    container_name: amapet-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT}:3000"
    volumes:
      - ./backups:/app/backups
    environment:
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/${MONGO_DB}?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID}
      PLATFORM_ADMIN_EMAIL: ${PLATFORM_ADMIN_EMAIL}
      LEGAL_NAME: ${LEGAL_NAME}
      LEGAL_STREET: ${LEGAL_STREET}
      LEGAL_CITY: ${LEGAL_CITY}
      LEGAL_COUNTRY: ${LEGAL_COUNTRY}
      LEGAL_EMAIL: ${LEGAL_EMAIL}
      LEGAL_WEBSITE: ${LEGAL_WEBSITE}
      SITE_URL: ${SITE_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      IMGBB_API_KEY: ${IMGBB_API_KEY}
    depends_on:
      - mongo
    networks:
      - amapet-network
      - npm

  frontend:
    build:
      context: ../frontend
    container_name: amapet-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:4000"
    environment:
      SITE_URL: ${SITE_URL}
      API_URL: ${API_URL}
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - amapet-network
      - npm

networks:
  amapet-network:
  npm:
    external: true
    name: nginx-proxy-manager_default

volumes:
  mongo-data:
